# SonarQube Scanner configuration for ACEest Fitness
sonar.projectKey=acefitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=.
sonar.tests=test_logic.py
sonar.python.version=3.11

# Exclusions
sonar.exclusions=venv/**,screenshots/**,**/__pycache__/**,*.pyc

# Coverage and test reports (generated by pytest --cov)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Quality Gate: fail pipeline if coverage < 80% or any blocker issues
sonar.qualitygate.wait=true
