apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-canary
  labels:
    app: aceest-app
    version: canary
spec:
  replicas: 1  # Small number for canary
  selector:
    matchLabels:
      app: aceest-app
      version: canary
  template:
    metadata:
      labels:
        app: aceest-app
        version: canary
    spec:
      containers:
      - name: aceest-app
        image: sivachokkalingam1510aceest-app:latest  # Or specific tag
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5